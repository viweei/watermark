name: Build and Release

on:
  push:
    tags:
      - "v*" # 推入以 v 开头的标签（如 v1.0.0）时自动触发编译和发布

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: watermark

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            binary_name: watermark
            artifact_name: watermark-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            binary_name: watermark.exe
            artifact_name: watermark-windows-x86_64
          - os: macos-latest
            target: macos-aarch64
            binary_name: watermark
            artifact_name: watermark-macos-aarch64

    steps:
      # 1. 检出源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Rust 工具链
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 3. 启用缓存加速编译
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 4. 安装 Linux 系统依赖（font-kit 需要 freetype/fontconfig）
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libfontconfig1-dev

      # 5. 编译 Release
      - name: Build Release
        run: cargo build --release

      # 6. 打包二进制文件
      - name: Package artifact
        shell: bash
        run: |
          cd target/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../${{ matrix.artifact_name }}.zip ${{ matrix.binary_name }}
          else
            tar -czf ../../${{ matrix.artifact_name }}.tar.gz ${{ matrix.binary_name }}
          fi

      # 7. 上传到 GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
